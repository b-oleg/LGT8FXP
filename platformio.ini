; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = test
src_dir = examples/basic-pio

[env]
platform = lgt8f
board = LGT8F328P

; change MCU frequency
board_build.f_cpu = 30000000

build_flags = 
	-Os
    -Wl,-u,__vectors_lgt,--section-start=.e2prom=0x7800

lib_extra_dirs = .

upload_protocol = custom
upload_port = COM4
upload_speed = 115200
upload_flags =
    -p$BOARD_MCU
    -P$UPLOAD_PORT
    -B$UPLOAD_SPEED
    -cstk500v1
upload_command = avrdude.exe $UPLOAD_FLAGS -U flash:w:$SOURCE:i

[env:examples]

[env:test]
test_framework = unity

lib_deps = throwtheswitch/Unity

build_flags =
    -Os
    -DUNITY_INCLUDE_CONFIG_H
    -I.pio/libdeps/test/Unity/src
    -Wl,-u,__vectors_lgt,--section-start=.e2prom=0x7800
	
test_port = COM3
test_speed = 1000000
